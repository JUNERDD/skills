name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer collection version, with or without a leading v"
        required: true
        type: string
      notes:
        description: "Release note lines. Each non-empty line becomes a changelog bullet unless it already starts with '- '."
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - VERSION
      - CHANGELOG.md

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release files
        env:
          RELEASE_NOTES: ${{ inputs.notes }}
        run: node scripts/prepare-release.mjs "${{ inputs.version }}"

      - name: Validate generated diff
        run: git diff --check

      - name: Create release pull request
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          version="${VERSION_INPUT#v}"
          tag="v${version}"
          branch="release/${tag}"

          if git rev-parse "$tag" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 1
          fi

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "Release branch $branch already exists"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add VERSION CHANGELOG.md README.md web/src/lib/content/urls.ts
          git commit -m "chore: release ${version}"
          git push -u origin "$branch"

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: release ${version}" \
            --body "Generated release files for ${tag}. Merge this PR to publish the GitHub release."

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          tag="v${version}"

          if git rev-parse "$tag" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping release."
            exit 0
          fi

          node scripts/release-notes.mjs "$version" > release-notes.md
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" \
            --title "$tag" \
            --notes-file release-notes.md
